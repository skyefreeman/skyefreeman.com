service: skyefreeman_com

image: skyefreeman/skyefreeman-com

servers:
  web:
    - 45.79.145.155

# kamal-proxy runs on 8080 so nginx can own 80/443
proxy:
  host: skyefreeman.com
  app_port: 3000
  ssl: false
  run:
    http_port: 8080

registry:
  server: ghcr.io
  username: skyefreeman
  password:
    - KAMAL_REGISTRY_PASSWORD

env:
  secret:
    - RAILS_MASTER_KEY
    - SKYEFREEMAN_COM_DATABASE_PASSWORD
  clear:
    SOLID_QUEUE_IN_PUMA: true

aliases:
  console: app exec --interactive --reuse "bin/rails console"
  shell: app exec --interactive --reuse "bash"
  logs: app logs -f
  dbc: app exec --interactive --reuse "bin/rails dbconsole --include-password"

volumes:
  - "skyefreeman_com_storage:/rails/storage"

asset_path: /rails/public/assets

builder:
  arch: amd64

ssh:
  user: skye
